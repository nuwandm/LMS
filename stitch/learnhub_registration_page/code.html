<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LearnHub Registration Page</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f3a61",
                        "primary-light": "#e9eff8", // Light tint for backgrounds
                        "background-light": "#f3f4f6",
                        "background-dark": "#14181e",
                        "strength-fair": "#f97316", // Orange for 'Fair'
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem", // 12px
                        "lg": "0.75rem",      // 12px
                        "xl": "1rem",         // 16px
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom radio logic to style parent label */
        .role-radio:checked + div {
            border-color: #1f3a61;
            background-color: #e9eff8;
        }
        .role-radio:checked + div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Main Card Container -->
<div class="bg-white dark:bg-gray-800 w-full max-w-[500px] rounded-lg shadow-xl overflow-hidden flex flex-col relative">
<!-- Header Section -->
<div class="px-8 pt-8 pb-4 text-center">
<!-- Logo -->
<div class="flex items-center justify-center gap-2 mb-4">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">school</span>
</div>
<span class="text-primary dark:text-white text-xl font-black tracking-tight">LearnHub</span>
</div>
<h1 class="text-[#101419] dark:text-white text-3xl font-black leading-tight tracking-[-0.033em] mb-2">Create your account</h1>
<p class="text-[#5b6f8b] dark:text-gray-400 text-sm font-normal">Join thousands of learners and instructors today</p>
</div>
<!-- Scrollable Form Area -->
<div class="px-8 pb-8 flex flex-col gap-6">
<!-- Role Selector -->
<div class="flex gap-3 w-full">
<!-- Option: Learn -->
<label class="flex-1 cursor-pointer group">
<input checked="" class="role-radio hidden" name="role" type="radio"/>
<div class="border-2 border-primary bg-primary-light dark:bg-primary/20 rounded-lg p-4 flex flex-col items-center justify-center text-center transition-all duration-200 h-full relative hover:border-primary/50">
<div class="absolute top-2 right-2 check-icon opacity-100 transition-all duration-200 scale-100">
<span class="material-symbols-outlined text-primary text-lg font-bold">check_circle</span>
</div>
<span class="material-symbols-outlined text-primary text-3xl mb-2">local_library</span>
<p class="text-[#101419] dark:text-white text-sm font-bold">I want to Learn</p>
<p class="text-[#5b6f8b] dark:text-gray-300 text-xs mt-1">Access courses</p>
</div>
</label>
<!-- Option: Teach -->
<label class="flex-1 cursor-pointer group">
<input class="role-radio hidden" name="role" type="radio"/>
<div class="border-2 border-[#d4dae3] dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg p-4 flex flex-col items-center justify-center text-center transition-all duration-200 h-full relative hover:border-primary/30">
<div class="absolute top-2 right-2 check-icon opacity-0 transition-all duration-200 scale-50">
<span class="material-symbols-outlined text-primary text-lg font-bold">check_circle</span>
</div>
<span class="material-symbols-outlined text-[#5b6f8b] dark:text-gray-300 text-3xl mb-2">cast_for_education</span>
<p class="text-[#101419] dark:text-white text-sm font-bold">I want to Teach</p>
<p class="text-[#5b6f8b] dark:text-gray-300 text-xs mt-1">Sell courses</p>
</div>
</label>
</div>
<!-- Form Inputs -->
<form class="flex flex-col gap-4">
<!-- Name Row -->
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-1.5">
<label class="text-[#101419] dark:text-white text-sm font-medium">First Name</label>
<input class="form-input w-full rounded-lg border border-[#d4dae3] dark:border-gray-600 bg-white dark:bg-gray-700 text-[#101419] dark:text-white h-11 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-[#9ca3af]" placeholder="Jane" type="text"/>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<label class="text-[#101419] dark:text-white text-sm font-medium">Last Name</label>
<input class="form-input w-full rounded-lg border border-[#d4dae3] dark:border-gray-600 bg-white dark:bg-gray-700 text-[#101419] dark:text-white h-11 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-[#9ca3af]" placeholder="Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="text-[#101419] dark:text-white text-sm font-medium">Email address</label>
<input class="form-input w-full rounded-lg border border-[#d4dae3] dark:border-gray-600 bg-white dark:bg-gray-700 text-[#101419] dark:text-white h-11 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-[#9ca3af]" placeholder="jane@example.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-[#101419] dark:text-white text-sm font-medium">Password</label>
<div class="relative">
<input class="form-input w-full rounded-lg border border-[#d4dae3] dark:border-gray-600 bg-white dark:bg-gray-700 text-[#101419] dark:text-white h-11 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary pr-10" type="password" value="secretpassword"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-[#5b6f8b] hover:text-[#101419] focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<!-- Strength Meter -->
<div class="flex items-center gap-3 mt-1">
<div class="h-1.5 flex-grow bg-gray-200 dark:bg-gray-600 rounded-full overflow-hidden">
<div class="h-full bg-strength-fair w-[60%] rounded-full"></div>
</div>
<span class="text-xs font-medium text-strength-fair">Fair</span>
</div>
</div>
<!-- Terms Checkbox -->
<label class="flex items-start gap-3 mt-1 cursor-pointer">
<input class="h-4 w-4 mt-0.5 rounded border-gray-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm text-[#5b6f8b] dark:text-gray-400">
                        I agree to the <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
                    </span>
</label>
<!-- CTA Button -->
<button class="w-full bg-primary hover:bg-[#152945] text-white font-semibold rounded-lg h-12 mt-2 transition-colors duration-200 shadow-sm flex items-center justify-center gap-2" type="button">
                    Create Account
                </button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-[#d4dae3] dark:border-gray-600"></div>
<span class="flex-shrink-0 mx-4 text-xs text-[#5b6f8b] uppercase font-medium tracking-wide">Or</span>
<div class="flex-grow border-t border-[#d4dae3] dark:border-gray-600"></div>
</div>
<!-- Google Sign Up -->
<button class="w-full bg-white dark:bg-gray-700 border border-[#d4dae3] dark:border-gray-600 text-[#101419] dark:text-white font-medium rounded-lg h-12 flex items-center justify-center gap-3 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors duration-200" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Sign up with Google
                </button>
</form>
</div>
<!-- Footer -->
<div class="px-8 pb-8 text-center bg-gray-50 dark:bg-gray-800/50 pt-4 mt-auto rounded-b-lg border-t border-gray-100 dark:border-gray-700">
<p class="text-sm text-[#5b6f8b] dark:text-gray-400">
                Already have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
</body></html>
