<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LearnHub Login Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f3b61", // Deep Blue
                        "background-light": "#f3f4f6", // Soft gray
                        "background-dark": "#111827",
                        "error": "#ef4444",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", // 8px
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025)',
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-white min-h-screen flex items-center justify-center p-4">
<!-- Login Card Container -->
<div class="w-full max-w-[440px] bg-white dark:bg-gray-800 rounded-xl shadow-card p-10 flex flex-col gap-8">
<!-- Header Section -->
<div class="flex flex-col items-center text-center">
<!-- Logo -->
<div class="flex items-center gap-2 mb-6">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[28px]">school</span>
</div>
<span class="text-primary text-2xl font-bold tracking-tight">LearnHub</span>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Welcome back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your details to sign in.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Email Input Group -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-error bg-white dark:bg-gray-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-error/20 placeholder:text-slate-400 text-sm transition-all" id="email" name="email" placeholder="Enter your email" type="email" value="alex.doe@company"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-error pointer-events-none flex items-center">
<span class="material-symbols-outlined text-[20px]">error</span>
</div>
</div>
<p class="text-error text-xs font-medium mt-0.5">Invalid email address</p>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary placeholder:text-slate-400 text-sm transition-all" id="password" name="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors flex items-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Utilities Row -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary/20 cursor-pointer" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-800 dark:group-hover:text-slate-200 transition-colors">Remember me</span>
</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-3 px-4 rounded-lg transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary mt-2" type="submit">
                Sign In
            </button>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-gray-600"></div>
<span class="flex-shrink-0 mx-4 text-xs font-medium text-slate-400 uppercase tracking-wider">OR</span>
<div class="flex-grow border-t border-slate-200 dark:border-gray-600"></div>
</div>
<!-- Social Login -->
<button class="w-full bg-white dark:bg-gray-700 hover:bg-slate-50 dark:hover:bg-gray-600 border border-slate-200 dark:border-gray-600 text-slate-700 dark:text-white font-medium py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
</form>
<!-- Footer -->
<div class="text-center text-sm text-slate-500 dark:text-slate-400">
            Don't have an account? 
            <a class="font-medium text-primary hover:text-primary/80 transition-colors ml-1" href="#">Register here</a>
</div>
</div>
</body></html>
